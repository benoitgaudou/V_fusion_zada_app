# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual triggering

permissions:
  contents: write

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"
    - name: Setup Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        python-version: 3.12
        channels: conda-forge
        channel-priority: strict
        activate-environment: geo-env
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        conda install -y geopandas        
        pip install pyinstaller
        if (Test-Path requirements.txt) {
          pip install -r requirements.txt
        }    
    - name: Run tests
      shell: bash -l {0}
      run: |
        python -c "import geopandas; print('GeoPandas OK')"        
    - name: Build release
      run: |
        # stop the build if there are Python syntax errors or undefined names
        # pyinstaller --onefile --add-data "app/templates:app/templates" --add-data "app/static:app/static" --add-data "models:models" run.py 
        pyinstaller --onefile --add-data "app/templates:app/templates" --add-data "app/static:app/static" run.py     

    - name: Create Release and Upload APK
      if: "github.event_name == 'workflow_dispatch'"
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ github.run_id }}
        files: dist/*
